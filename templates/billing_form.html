<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Billing Form</title>
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <section class="billing-form-section">
        <h2>Billing Form</h2>
        <form action="/billing" method="POST">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" required>

            <label for="contact">Contact</label>
            <input type="text" id="contact" name="contact" required>

            <label for="address">Address</label>
            <textarea id="address" name="address" required></textarea>

            <label for="date">Date</label>
            <input type="date" id="date" name="date" required>

            <div id="items">
                <div class="item-row">
                    <label for="item">Item</label>
                    <input type="text" name="item" required>

                    <label for="quantity">Quantity</label>
                    <input type="number" name="quantity" required>

                    <label for="price">Price</label>
                    <input type="number" name="price" required>

                    <label for="discount">Discount (%)</label>
                    <input type="number" name="discount" required>

                    <label for="tax">Tax (%)</label>
                    <input type="number" name="tax" required>
                </div>
            </div>

            <button type="button" id="add-item-btn">Add Item</button>
            <button type="submit">Generate Bill</button>
            <button type="button" onclick="window.location.href='/'">Close</button>
        </form>

        <script>
            document.addEventListener("DOMContentLoaded", () => {
                document.getElementById("add-item-btn").addEventListener("click", () => {
                    let itemRow = document.createElement("div");
                    itemRow.classList.add("item-row");
                    itemRow.innerHTML = `
                        <label for="item">Item</label>
                        <input type="text" name="item" required>
                        <label for="quantity">Quantity</label>
                        <input type="number" name="quantity" required>
                        <label for="price">Price</label>
                        <input type="number" name="price" required>
                        <label for="discount">Discount (%)</label>
                        <input type="number" name="discount" required>
                        <label for="tax">Tax (%)</label>
                        <input type="number" name="tax" required>
                    `;
                    document.getElementById("items").appendChild(itemRow);
                });
            });
        </script>
    </section>
</body>
</html>
