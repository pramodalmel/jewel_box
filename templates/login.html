<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Jewel Box</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="auth-section">
        <div class="auth-container">            <div class="logo-section">
                <img src="/static/images/LOGO.png" alt="Jewel Box Logo" class="auth-logo">
                <h1 class="brand-title">PRAVEEN JEWELLERS</h1>
            </div>
            <h2>Welcome Back</h2>
            <p class="auth-subtitle">Please login to your account</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="/login" method="POST">
                <div class="input-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter your username">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter your password">
                </div>
                <div class="button-group">
                    <button type="submit" class="btn">Login</button>
                </div>
                <div class="auth-links">
                    <p>Don't have an account? <a href="/signup">Sign up</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
