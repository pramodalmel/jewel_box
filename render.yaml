services:
  - type: web
    name: jewel-box
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_ENV
        value: production
      - key: SQLALCHEMY_DATABASE_URI
        fromDatabase:
          name: jewel-box-db
          property: connectionString

databases:
  - name: jewel-box-db
    databaseName: jewelbox
    user: jewelbox_user
