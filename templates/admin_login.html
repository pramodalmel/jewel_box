<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Praveen Jewellers</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="stylesheet" href="/static/css/login.css">
</head>
<body>
    <div class="auth-section">
        <div class="auth-container">
            <div class="logo-section">
                <img src="/static/images/LOGO.png" alt="Jewel Box Logo" class="auth-logo">
                <h1 class="brand-title">PRAVEEN JEWELLERS</h1>
            </div>
            <h2>Admin Login</h2>
            <p class="auth-subtitle">Please login to access billing system</p>
            
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}
                    {% for category, message in messages %}
                        <div class="flash-message {{ category }}">{{ message }}</div>
                    {% endfor %}
                {% endif %}
            {% endwith %}

            <form action="{{ url_for('admin_login') }}" method="POST">
                <div class="input-group">
                    <label for="username">Admin Username</label>
                    <input type="text" id="username" name="username" required placeholder="Enter admin username">
                </div>
                <div class="input-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Enter admin password">
                </div>
                <div class="button-group">
                    <button type="submit" class="btn">Login as Admin</button>
                </div>
                <div class="auth-links">
                    <p>Regular user? <a href="{{ url_for('login') }}">Login here</a></p>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
